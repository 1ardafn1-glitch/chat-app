<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Chat App</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

#app {
    width: 400px;
    height: 600px;
    background: #111827;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

header {
    background: #1f2937;
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

#chat {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    color: white;
}

.msg {
    background: #2563eb;
    padding: 8px 12px;
    margin: 5px 0;
    border-radius: 12px;
    width: fit-content;
    max-width: 80%;
}

#typing {
    font-size: 12px;
    color: gray;
    padding: 5px 10px;
}

#inputBox {
    display: flex;
    padding: 10px;
    background: #1f2937;
}

#msg {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    outline: none;
}

button {
    margin-left: 10px;
    background: #22c55e;
    border: none;
    color: white;
    padding: 10px 15px;
    border-radius: 10px;
}

#login {
    text-align: center;
    color: white;
    padding: 20px;
}

#name {
    padding: 10px;
    border-radius: 10px;
    border: none;
}
</style>
</head>

<body>

<div id="app">

<header>🔥 Chat App</header>

<!-- login -->
<div id="login">
    <h3>İsmini gir</h3>
    <input id="name" placeholder="isim">
    <br><br>
    <button onclick="join()">Başla</button>
</div>

<!-- chat -->
<div id="chat" style="display:none;"></div>
<div id="typing"></div>

<div id="inputBox" style="display:none;">
    <input id="msg" placeholder="Mesaj yaz...">
    <button onclick="send()">➤</button>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let user = "";

// 👤 giriş
function join(){
    const name = document.getElementById("name").value;

    if(name.trim() === ""){
        alert("İsim zorunlu!");
        return;
    }

    user = name;

    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "block";
    document.getElementById("inputBox").style.display = "flex";
}

// 💬 gönder
function send(){
    const input = document.getElementById("msg");
    const msg = input.value;

    if(msg.trim() === "") return;

    socket.emit("message", {
        name: user,
        msg: msg
    });

    input.value = "";
    input.focus();
}

// ⌨️ ENTER
document.getElementById("msg").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        send();
    }
});

// ✍️ yazıyor bildirimi
document.getElementById("msg").addEventListener("input", () => {
    socket.emit("typing", user);
});

// 💬 mesaj alma
socket.on("message", (data) => {
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `<b>${data.name}:</b> ${data.msg}`;

    document.getElementById("chat").appendChild(div);

    document.getElementById("chat").scrollTop = 999999;
});

// ✍️ typing göster
socket.on("typing", (name) => {
    const t = document.getElementById("typing");
    t.innerText = `${name} yazıyor...`;

    setTimeout(() => {
        t.innerText = "";
    }, 1000);
});
</script>

</body>
</html>
