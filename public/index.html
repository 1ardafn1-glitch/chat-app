<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Chat App</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#app{
    width:420px;
    height:650px;
    background:#111827;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

header{
    background:#1f2937;
    color:white;
    padding:12px;
    text-align:center;
    font-weight:bold;
}

#chat{
    flex:1;
    padding:10px;
    overflow-y:auto;
    color:white;
}

.msg{
    background:#2563eb;
    padding:8px;
    margin:5px 0;
    border-radius:10px;
    width:fit-content;
    max-width:80%;
}

#typing{
    font-size:12px;
    color:gray;
    padding:5px;
}

#inputBox{
    display:flex;
    padding:10px;
    background:#1f2937;
}

input{
    flex:1;
    padding:8px;
    border:none;
    border-radius:8px;
}

button{
    margin-left:5px;
    padding:8px 10px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
}

#login{
    padding:20px;
    color:white;
}
</style>
</head>

<body>

<div id="app">

<header>🔥 Group Chat</header>

<div id="login">
    <input id="name" placeholder="İsim"><br><br>
    <input id="room" placeholder="Oda"><br><br>
    <input id="pass" placeholder="Şifre"><br><br>
    <button onclick="join()">Giriş</button>
</div>

<div id="chat" style="display:none;"></div>
<div id="typing"></div>

<div id="inputBox" style="display:none;">
    <input id="msg" placeholder="Mesaj...">
    <button onclick="send()">➤</button>
    <button onclick="startVoice()">🎤</button>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let user="";
let peer;
let stream;

// 🚪 giriş
function join(){
    socket.emit("joinRoom",{
        name:document.getElementById("name").value,
        room:document.getElementById("room").value,
        password:document.getElementById("pass").value
    });
}

// ❌ hata
socket.on("errorMessage", m=>{
    alert(m);
});

// ✅ giriş başarılı
socket.on("system", m=>{
    document.getElementById("login").style.display="none";
    document.getElementById("chat").style.display="block";
    document.getElementById("inputBox").style.display="flex";
    addMsg("SYSTEM", m);
});

// 💬 mesaj
function send(){
    const input=document.getElementById("msg");
    if(input.value.trim()=="") return;

    socket.emit("message", input.value);
    input.value="";
}

socket.on("message", d=>{
    addMsg(d.name,d.msg);
});

// ✍️ typing
document.getElementById("msg").addEventListener("input",()=>{
    socket.emit("typing");
});

socket.on("typing",name=>{
    document.getElementById("typing").innerText=name+" yazıyor...";
    setTimeout(()=>document.getElementById("typing").innerText="",1000);
});

// 📩 mesaj ekle
function addMsg(n,m){
    const div=document.createElement("div");
    div.className="msg";
    div.innerHTML=`<b>${n}:</b> ${m}`;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop=999999;
}

// ⌨️ ENTER
document.getElementById("msg").addEventListener("keypress",e=>{
    if(e.key==="Enter") send();
});

// 🎤 VOICE (BASİT LIVE)
async function startVoice(){

    stream = await navigator.mediaDevices.getUserMedia({audio:true});

    peer = new RTCPeerConnection({
        iceServers:[{urls:"stun:stun.l.google.com:19302"}]
    });

    stream.getTracks().forEach(t=>peer.addTrack(t,stream));

    peer.ontrack=(e)=>{
        const audio=new Audio();
        audio.srcObject=e.streams[0];
        audio.play();
    };

    peer.onicecandidate=(e)=>{
        if(e.candidate){
            socket.emit("signal",{type:"candidate",candidate:e.candidate});
        }
    };

    const offer=await peer.createOffer();
    await peer.setLocalDescription(offer);

    socket.emit("signal",{type:"offer",offer});
}

// 🎧 SIGNAL
socket.on("signal",async data=>{

    if(data.data.type==="offer"){

        peer=new RTCPeerConnection({
            iceServers:[{urls:"stun:stun.l.google.com:19302"}]
        });

        stream=await navigator.mediaDevices.getUserMedia({audio:true});
        stream.getTracks().forEach(t=>peer.addTrack(t,stream));

        peer.ontrack=(e)=>{
            const audio=new Audio();
            audio.srcObject=e.streams[0];
            audio.play();
        };

        peer.onicecandidate=(e)=>{
            if(e.candidate){
                socket.emit("signal",{type:"candidate",candidate:e.candidate});
            }
        };

        await peer.setRemoteDescription(data.data.offer);

        const answer=await peer.createAnswer();
        await peer.setLocalDescription(answer);

        socket.emit("signal",{type:"answer",answer});
    }

    if(data.data.type==="answer"){
        await peer.setRemoteDescription(data.data.answer);
    }

    if(data.data.type==="candidate"){
        await peer.addIceCandidate(data.data.candidate);
    }
});
</script>

</body>
</html>
