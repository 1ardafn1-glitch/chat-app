<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Discord Clone</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#313338;
    color:white;
}

#app{
    display:flex;
    height:100vh;
}

/* LEFT */
#left{
    width:240px;
    background:#2b2d31;
    padding:10px;
}

button, input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
}

button{
    background:#5865f2;
    color:white;
    cursor:pointer;
}

/* CHAT */
#chat{
    flex:1;
    display:flex;
    flex-direction:column;
}

#top{
    height:50px;
    background:#1e1f22;
    display:flex;
    align-items:center;
    padding-left:20px;
}

#messages{
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.msg{
    margin:5px 0;
}

.system{
    color:gray;
    font-size:12px;
}

#inputBox{
    display:flex;
    padding:10px;
}

#msg{
    flex:1;
    background:#40444b;
    color:white;
}

#ptt{
    width:80px;
    margin-left:10px;
    background:red;
}

#online{
    position:absolute;
    right:10px;
    top:60px;
    background:#2b2d31;
    padding:10px;
    width:150px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <input id="user" placeholder="Kullanıcı adı">
    <button onclick="login()">Giriş</button>
</div>

<div id="app" style="display:none;">

<!-- LEFT -->
<div id="left">

<h3>Menu</h3>

<button onclick="joinGlobal()">🌍 Global</button>

<input id="room" placeholder="oda">
<input id="pass" placeholder="şifre">

<button onclick="createRoom()">➕ Oda Kur</button>
<button onclick="joinRoom()">🚪 Oda Gir</button>

</div>

<!-- CHAT -->
<div id="chat">

<div id="top">Chat</div>

<div id="messages"></div>

<div id="inputBox">

<input id="msg" placeholder="mesaj">

<button onclick="send()">➤</button>

<button id="ptt">🎤</button>

</div>

</div>

</div>

<div id="online"></div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let user = "";
let peer;
let stream;

// 👤 LOGIN
function login(){

    user = document.getElementById("user").value;

    socket.emit("login", user);

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";
}

// 🌍 GLOBAL
function joinGlobal(){
    socket.emit("joinGlobal");
}

// ➕ ROOM
function createRoom(){

    socket.emit("createRoom",{
        room:document.getElementById("room").value,
        password:document.getElementById("pass").value
    });

    alert("Oda oluşturuldu");
}

// 🚪 JOIN ROOM
function joinRoom(){

    socket.emit("joinRoom",{
        room:document.getElementById("room").value,
        password:document.getElementById("pass").value
    });
}

// 💬 SEND
function send(){

    const m = document.getElementById("msg");

    if(m.value.trim()=="") return;

    socket.emit("message", m.value);

    m.value="";
}

// ✍️ typing
document.getElementById("msg")
.addEventListener("input",()=>socket.emit("typing"));

// 💬 message
socket.on("message",(d)=>{

    const div=document.createElement("div");

    div.className="msg";

    div.innerHTML=`<b>${d.name}</b>: ${d.msg}`;

    document.getElementById("messages").appendChild(div);
});

// system
socket.on("system",(d)=>{

    const div=document.createElement("div");

    div.className="system";

    div.innerText=d.text;

    document.getElementById("messages").appendChild(div);
});

// online users
socket.on("onlineUsers",(list)=>{

    document.getElementById("online").innerHTML =
    "<b>Online</b><br>" + list.join("<br>");
});

// ❌ error
socket.on("errorMessage",(m)=>{
    alert(m);
});

// 🎤 PUSH TO TALK
const btn = document.getElementById("ptt");

btn.addEventListener("mousedown", startVoice);
btn.addEventListener("mouseup", stopVoice);

async function startVoice(){

    stream = await navigator.mediaDevices.getUserMedia({audio:true});

    peer = new RTCPeerConnection({
        iceServers:[{urls:"stun:stun.l.google.com:19302"}]
    });

    stream.getTracks().forEach(t=>peer.addTrack(t,stream));

    peer.ontrack=(e)=>{

        const audio=new Audio();
        audio.srcObject=e.streams[0];
        audio.play();
    };

    peer.onicecandidate=(e)=>{
        if(e.candidate){
            socket.emit("signal",{type:"candidate",candidate:e.candidate});
        }
    };

    const offer=await peer.createOffer();
    await peer.setLocalDescription(offer);

    socket.emit("signal",{type:"offer",offer});
}

function stopVoice(){

    if(stream){
        stream.getTracks().forEach(t=>t.stop());
    }

    if(peer){
        peer.close();
    }
}

// signal
socket.on("signal",async (data)=>{

    if(data.type==="offer"){

        peer=new RTCPeerConnection({
            iceServers:[{urls:"stun:stun.l.google.com:19302"}]
        });

        stream=await navigator.mediaDevices.getUserMedia({audio:true});

        stream.getTracks().forEach(t=>peer.addTrack(t,stream));

        peer.ontrack=(e)=>{
            const audio=new Audio();
            audio.srcObject=e.streams[0];
            audio.play();
        };

        await peer.setRemoteDescription(data.offer);

        const ans=await peer.createAnswer();
        await peer.setLocalDescription(ans);

        socket.emit("signal",{type:"answer",answer:ans});
    }

    if(data.type==="answer"){
        await peer.setRemoteDescription(data.answer);
    }

    if(data.type==="candidate"){
        await peer.addIceCandidate(data.candidate);
    }
});

</script>

</body>
</html>
